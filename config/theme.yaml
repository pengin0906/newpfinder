# NewPfinder theme configuration — Windows Explorer style
# Edit this file to change look & feel — reloads live.

theme:
  name: "explorer-light"

  # Window
  window:
    minWidth: 1024
    minHeight: 600
    titleBarStyle: hidden

  # Sidebar (Explorer Navigation Pane)
  sidebar:
    width: 240
    collapsedWidth: 48
    background: "#ffffff"
    brandColor: "#0078d4"
    textColor: "#1a1a1a"
    activeColor: "#0078d4"
    hoverBg: "rgba(0,0,0,0.04)"
    sectionColor: "#666666"

  # Content area
  content:
    background: "#ffffff"
    cardBg: "#ffffff"
    cardBorder: "#e5e5e5"
    cardRadius: 4

  # Toolbar (Explorer Command Bar)
  toolbar:
    height: 40
    background: "#f3f3f3"
    borderColor: "#e5e5e5"

  # Tab bar
  tabBar:
    height: 34
    activeBg: "#ffffff"
    inactiveBg: "#f0f0f0"
    textColor: "#666"
    activeTextColor: "#1a1a1a"

  # Status bar (Explorer-style light)
  statusBar:
    height: 24
    background: "#f0f0f0"
    textColor: "#444444"

  # Accent colors (Windows 11 palette)
  accent:
    primary: "#0078d4"
    success: "#107c10"
    warning: "#d83b01"
    danger: "#c50f1f"
    info: "#0078d4"

  # File type colors
  categoryColors:
    folder: "#dcb67a"
    document: "#0078d4"
    pdf: "#c50f1f"
    spreadsheet: "#107c10"
    presentation: "#d83b01"
    image: "#881798"
    video: "#c30052"
    audio: "#008272"
    font: "#5d4037"
    code: "#107c10"
    config: "#546e7a"
    script: "#107c10"
    data: "#0063b1"
    archive: "#d83b01"
    executable: "#c50f1f"
    other: "#767676"

  # Git status indicators
  git:
    modified: "#d83b01"
    staged: "#107c10"
    untracked: "#c50f1f"

  # Font
  font:
    family: "'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Noto Sans JP', 'Yu Gothic UI', sans-serif"
    sizeBase: 12
    sizeSm: 11
    sizeLg: 14
    monoFamily: "'Cascadia Code', 'Consolas', 'SF Mono', monospace"

  # File list
  fileList:
    rowHeight: 28
    iconSize: 18
    gridIconSize: 48
    selectedBg: "#cce8ff"
    selectedBorder: "#99d1ff"
    hoverBg: "#e5f3ff"
    stripeBg: "rgba(0,0,0,0.01)"

  # Preview panel
  preview:
    width: 280
    background: "#ffffff"
    borderColor: "#e5e5e5"
